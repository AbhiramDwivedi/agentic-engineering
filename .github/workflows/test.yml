name: Companion code tests

# pull_request unfiltered for the same reason as deploy.yml: "pytest" is a
# required status check and must report on every PR.
on:
  push:
    paths:
      - "listing-studio/**"
      - ".github/workflows/test.yml"
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: listing-studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q
